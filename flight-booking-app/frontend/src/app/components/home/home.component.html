<div class="hero">
  <div class="hero-content">
    <h1>🛫 Find Your Perfect Flight</h1>
    <p>Book flights to destinations worldwide with the best prices</p>
    
    <div class="search-box">
      <div class="search-form">
        <div class="form-group">
          <label>From</label>
          <input 
            type="text" 
            [(ngModel)]="searchOrigin" 
            placeholder="Origin city"
            class="form-control">
        </div>
        
        <div class="form-group">
          <label>To</label>
          <input 
            type="text" 
            [(ngModel)]="searchDestination" 
            placeholder="Destination city"
            class="form-control">
        </div>
        
        <button (click)="searchFlights()" class="btn btn-primary">
          Search Flights
        </button>
      </div>
    </div>
  </div>
</div>

<div class="features">
  <div class="container">
    <h2>Why Choose Us?</h2>
    <div class="features-grid">
      <div class="feature-card">
        <div class="feature-icon">💰</div>
        <h3>Best Prices</h3>
        <p>Guaranteed lowest prices on flights</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">🌍</div>
        <h3>Worldwide</h3>
        <p>Flights to destinations around the globe</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">🔒</div>
        <h3>Secure</h3>
        <p>Your data is safe with us</p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">⚡</div>
        <h3>Fast Booking</h3>
        <p>Book your flight in minutes</p>
      </div>
    </div>
  </div>
</div>
