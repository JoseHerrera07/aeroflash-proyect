sonar.projectKey=aeroflash-project
sonar.projectName=AeroFlash-Project
sonar.projectVersion=1.0

# Analiza la raíz del proyecto (FastAPI)
sonar.sources=.
sonar.language=py
sonar.python.version=3.10

# Evita que SonarQube pueda analizar carpetas innecesarias de Terraform o virtuales de mi proyecto
sonar.exclusions=**/.terraform/**, **/terraform.tfstate**, **/venv/**, **/node_modules/**
